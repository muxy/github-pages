<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="330" viewBox="0 0 1120 330" role="img" aria-labelledby="title desc">
  <title id="title">Main-thread dispatch flow</title>
  <desc id="desc">A diagram showing Gateway callbacks enqueued and drained by Unity Update before touching gameplay systems.</desc>
  <defs>
    <style>
      .bg { fill: #f7f9fc; }
      .card { fill: #ffffff; stroke: #b8c7d9; stroke-width: 2; rx: 14; }
      .queue { fill: #fff8f0; stroke: #d6a15f; stroke-width: 2; rx: 14; }
      .main { fill: #ecf7ef; stroke: #72b883; stroke-width: 2; rx: 14; }
      .title { fill: #12365d; font: 700 22px Arial, sans-serif; }
      .body { fill: #4d6075; font: 16px Arial, sans-serif; }
      .arrow { stroke: #2f7abf; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#2f7abf"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="330" rx="18"/>
  <g transform="translate(55 92)">
    <rect class="card" width="190" height="110"/>
    <text class="title" x="22" y="44">Gateway event</text>
    <text class="body" x="22" y="76">Auth, action, bits</text>
  </g>
  <path class="arrow" d="M 257 148 H 330"/>
  <g transform="translate(342 92)">
    <rect class="queue" width="205" height="110"/>
    <text class="title" x="22" y="44">Effect request</text>
    <text class="body" x="22" y="76">Enqueue data only</text>
  </g>
  <path class="arrow" d="M 559 148 H 632"/>
  <g transform="translate(644 92)">
    <rect class="main" width="190" height="110"/>
    <text class="title" x="22" y="44">Unity Update</text>
    <text class="body" x="22" y="76">Drain queue</text>
  </g>
  <path class="arrow" d="M 846 148 H 919"/>
  <g transform="translate(931 92)">
    <rect class="card" width="150" height="110"/>
    <text class="title" x="22" y="44">Gameplay</text>
    <text class="body" x="22" y="76">Spawn, UI, FX</text>
  </g>
  <text class="body" x="270" y="260">Only the Unity Update side should touch scene objects, prefabs, UI, physics, or gameplay singletons.</text>
</svg>
