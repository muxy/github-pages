name: Validate and deploy docs preview

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCS_PRODUCTION: ${{ vars.DOCS_PRODUCTION || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Validate source and generated API reference
        run: |
          python scripts/validate_docs.py
          python scripts/generate_api_reference.py
          python scripts/verify_sdk_sources.py --online
          python scripts/verify_sdk_snippets.py --online
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Require approved content for a production deployment
        if: env.DOCS_PRODUCTION == 'true'
        run: python scripts/validate_docs.py --require-approved

      - name: Build strictly
        run: mkdocs build --strict

      - name: Generate static compatibility and agent interfaces
        run: python scripts/generate_site_contracts.py

      - name: Validate routes and published contracts
        run: |
          if [ "$DOCS_PRODUCTION" = "true" ]; then
            python scripts/validate_docs.py --site site --production
          else
            python scripts/validate_docs.py --site site --preview
          fi

      - name: Install Chromium
        run: python -m playwright install --with-deps chromium

      - name: Run local docs server
        run: python -m http.server 8000 --directory site >/tmp/muxy-docs-server.log 2>&1 &

      - name: Check current-page links and anchors
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          args: >-
            --no-progress
            --include-fragments
            --index-files index.html
            --root-dir '${{ github.workspace }}/site'
            --exclude-loopback
            --exclude '^https://docs\.muxy\.io'
            --exclude '^https://github\.com/muxy/github-pages/(?:raw|edit)/main/'
            --accept '200..=399'
            --files-from './site/current-link-inputs.txt'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run responsive visual smoke tests
        run: python scripts/render_checks.py --base-url http://127.0.0.1:8000

      - name: Check every current page for accessibility structure and mobile overflow
        run: python scripts/accessibility_checks.py --base-url http://127.0.0.1:8000

      - name: Prove every current page remains readable without JavaScript
        run: python scripts/no_js_checks.py --base-url http://127.0.0.1:8000

      - name: Smoke the complete generated contract
        run: |
          if [ "$DOCS_PRODUCTION" = "true" ]; then
            python scripts/smoke_production.py --base-url http://127.0.0.1:8000 --indexing-mode production
          else
            python scripts/smoke_production.py --base-url http://127.0.0.1:8000 --indexing-mode preview
          fi

      - name: Build production-indexable artifact for Lighthouse SEO
        run: |
          DOCS_PRODUCTION=true mkdocs build --strict
          DOCS_PRODUCTION=true python scripts/generate_site_contracts.py
          python scripts/validate_docs.py --site site --production

      - name: Run Lighthouse accessibility checks
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://127.0.0.1:8000/
            http://127.0.0.1:8000/docs/unity-gateway-tutorial/
            http://127.0.0.1:8000/reference/extension-config-1/
          configPath: ./lighthouserc.json
          uploadArtifacts: true

      - name: Restore deployment indexing policy
        run: |
          mkdocs build --strict
          python scripts/generate_site_contracts.py
          if [ "$DOCS_PRODUCTION" = "true" ]; then
            python scripts/validate_docs.py --site site --production
          else
            python scripts/validate_docs.py --site site --preview
          fi

      - name: Upload visual artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docs-visual-smoke
          path: artifacts/visual

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy GitHub Pages preview
        id: deployment
        uses: actions/deploy-pages@v4
