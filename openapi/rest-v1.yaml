    post:
      summary: Create a GameLink authorization code
      description: Creates a six-character authorization code for the current JWT.
        The code expires after five minutes and can be exchanged by a GameLink client
        during PIN authentication.
      operationId: post-gamelink-token
      x-doc-title: Create a GameLink Authorization Code
      x-doc-description: Create a short-lived GameLink PIN for the current extension
        authorization.
