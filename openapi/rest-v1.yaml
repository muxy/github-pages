servers:
- url: https://api.muxy.io/v1/e
paths:
  /accumulate:
    get:
      summary: Accumulate
      description: 'Accumulate


        Requires an admin, backend, or broadcaster JWT.'
      operationId: get-accumulate
      parameters:
      - name: id
        in: query
        description: The name of the accumulation buffer from which to retrieve data.
        schema:
          type: string
          default: default
      - name: start
        in: query
        description: Unix millisecond timestamp of earliest entry to include in the
          result.
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        observed:
                          type: integer
                          example: 1634401498121
                          default: 0
                        channel_id:
                          type: string
                          example: '12345'
                        opaque_user_id:
                          type: string
                          example: U12345
                        user_id:
                          type: string
                          example: '12345'
                        data:
                          type: object
                          properties: {}
                  latest:
                    type: integer
                    example: 1634401498121
                    default: 0
              example:
                data:
                - observed: 1634401498121
                  channel_id: '12345'
                  opaque_user_id: U12345
                  user_id: ''
                  data:
                    next_game: Day of the Tentacle
                latest: 1634401498121
        '400':
          description: '400'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                reason: '400'
        '403':
          description: The JWT role is not allowed to perform this operation.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                reason: The JWT role is not allowed to perform this operation.
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --request GET \\\n  --url https://api.muxy.io/v1/e/accumulate\
            \ \\\n  --header 'authorization: <Client ID> <broadcaster, admin, or backend\
            \ JWT>' \\\n  --header 'content-type: application/json'"
        samples-languages:
        - curl
      x-doc-slug: accumulate-1
      security:
      - MuxyAuthorization: []
    post:
      summary: Accumulate
      description: ''
      operationId: post-accumulate
      parameters:
      - name: id
        in: query
        description: The name of the accumulation buffer to which to write data.
        schema:
          type: string
          default: default
      requestBody:
        content:
          application/json:
            schema:
              type: object
              description: Complete JSON value to store or submit.
              additionalProperties: true
            example:
              next_game: Day of the Tentacle
        required: true
      responses:
        '200':
          description: Write accepted. The current service returns an empty JSON object.
          content:
            application/json:
              schema:
                type: object
                maxProperties: 0
              example: {}
        '400':
          description: '400'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                reason: '400'
      deprecated: false
      x-readme:
        code-samples:
        - language: curl
          code: "curl --request POST \\\n  --url https://api.muxy.io/v1/e/accumulate\
            \ \\\n  --header 'authorization: <Client ID> <any JWT>' \\\n  --header\
            \ 'content-type: application/json' \\\n  --data '{ \"next_game\": \"Day\
            \ of the Tentacle\" }'"
        samples-languages:
        - curl
      x-doc-slug: accumulate-2
