      summary: Submit votes
      description: 'Submits a value from -128 through 128. If `value` is omitted the
        handler submits `0`. Missing or explicit `count: 0` becomes `1`; positive
        counts are capped at 30 per request and must also fit the poll''s configured
        per-user limit.'
