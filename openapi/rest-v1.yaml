components:
  securitySchemes:
    MuxyAuthorization:
      type: apiKey
      in: header
      name: Authorization
      description: '`<Twitch Extension Client ID> <Muxy JWT>`'
  schemas:
    JsonPatchOperation:
      type: object
      required:
      - op
      - path
      properties:
        op:
          type: string
          enum:
          - add
          - remove
          - replace
          - move
          - copy
          - test
        path:
          type: string
          description: JSON Pointer to the target value.
        from:
          type: string
          description: Source JSON Pointer for move or copy.
        value:
          description: Value used by add, replace, or test.
    ErrorResponse:
      type: object
      properties:
        reason:
          type: string
    BroadcastMessage:
      type: object
      properties:
        target:
          type: string
          description: PubSub target; use broadcast for a channel-wide message.
        event:
          type: string
          default: default
        user_id:
          type: string
          description: Target Twitch channel ID for channel broadcasts.
        data:
          type: object
          additionalProperties: true
      required:
      - data
    VoteResponse:
      type: object
      required:
      - stddev
      - mean
      - sum
      - specific
      - count
      - decay
      properties:
        stddev:
          type: number
          description: Sample standard deviation across effective stored votes.
        mean:
          type: number
          description: Mean of all effective stored vote values.
        sum:
          type: number
          description: Sum of all effective stored vote values.
        specific:
          type: array
          description: Exactly 32 counters. Indexes 0 through 31 count votes whose
            value equals that index; values outside this range still contribute to
            the other statistics.
          minItems: 32
          maxItems: 32
          items:
            type: integer
            minimum: 0
        count:
          type: integer
          minimum: 0
          description: Number of effective stored vote entries after per-user replacement
            and modifiers; this is not the number of requests.
        decay:
          type: object
          additionalProperties: true
        vote:
          type: integer
          minimum: -128
          maximum: 128
          description: The caller's known vote, omitted when no vote is known.
    VoteConfiguration:
      type: object
      properties:
        userIDVoting:
          type: boolean
        distinctOptionsPerUser:
          type: integer
          minimum: 1
          maximum: 258
          default: 1
        totalVotesPerUser:
          type: integer
          minimum: 1
          maximum: 1024
          default: 1
        votesPerOption:
          type: integer
          minimum: 1
          maximum: 1024
          default: 1
        global:
          type: boolean
        disabled:
          type: boolean
        prompt:
          type: string
        options:
          type: array
          items:
            type: string
        userData: {}
        endsAt:
          type: integer
          description: Unix timestamp in seconds.
        startsAt:
          type: integer
          description: Unix timestamp in seconds.
        status:
          type: string
          enum:
          - pending
          - active
          - expired
          readOnly: true
security:
- MuxyAuthorization: []
