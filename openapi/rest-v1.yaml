          description: A short-lived GameLink authorization code.
          content:
            application/json:
              schema:
                type: object
                required:
                - token
                properties:
                  token:
                    type: string
                    minLength: 6
                    maxLength: 6
                    pattern: ^[A-HJ-KM-NP-Z2-46-9]{6}$
                    description: Six-character code using an ambiguity-reduced uppercase
                      alphabet; expires after five minutes.
              example:
                token: ABC234
        '400':
          description: The serialized authorization header exceeds 1,024 characters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
